<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TG1 ASI (Loja virtual)</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<nav>
    <h1>🛍️ Loja Virtual</h1>
    <div>
        <div id="botoesAdmin"></div>
        <div id="painelLogin"></div>
        <a href="carrinho.html" class="carrinho-link">🛒 Ver Carrinho</a>
    </div>
</nav>

<!-- MODAL - Adicionar Produto -->
<div id="modalAdicionarProduto" class="modal" onclick="fecharModalAoClicarFora(event)">
    <div class="modal-conteudo">
        <div class="modal-header">
            <h2>📦 Adicionar Novo Produto</h2>
            <button onclick="fecharModalAdicionarProduto()" class="btn-fechar">&times;</button>
        </div>
        <div class="modal-body">
            <div class="form-adicionar">
                <div class="campo">
                    <label for="nomeProduto">Nome do produto</label>
                    <input type="text" id="nomeProduto" placeholder="Ex: Camiseta" maxlength="40">
                </div>
                <div class="campo">
                    <label for="precoProduto">Preço (R$)</label>
                    <input type="number" id="precoProduto" placeholder="99.90" step="0.01" min="0.01">
                </div>
                <button id="btnAdicionarProduto" class="btn-salvar">✅ Adicionar</button>
            </div>
        </div>
    </div>
</div>

<div class="painel">
    <h2>🛒 Produtos disponíveis</h2>
    <div id="containerListaProdutos" class="lista-produtos">
        <div class="mensagem-vazia">Nenhum produto cadastrado.</div>
    </div>
</div>
  
</body>
<script src="../js/products.js"></script>
<script src="../js/addProducts.js"></script>
<script src="../js/cart.js"></script>
<script src="../js/app.js"></script>
</html>
